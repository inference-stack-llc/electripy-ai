site_name: ElectriPy AI
site_url: https://electripy.ai/docs/
site_description: >-
  The Open Source AI Application Runtime — reliability, observability, governance,
  evaluation, MCP integration, skills packaging, realtime orchestration, and
  30+ composable runtime components for production AI systems.
site_author: ElectriPy AI Contributors
repo_url: https://github.com/inference-stack-llc/electripy-ai
repo_name: inference-stack-llc/electripy-ai

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Overview: index.md
  - Manifesto: manifesto.md
  - LSAS Architecture: lsas.md
  - Architecture: architecture.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Runtime Domains:
      - Reliability:
          - Concurrency: user-guide/concurrency.md
          - Circuit Breaker: user-guide/circuit-breaker.md
      - Observability:
          - Observe — Structured Tracing: user-guide/ai-observe.md
          - Telemetry: user-guide/ai-telemetry.md
          - Sensitive Data Scanner: user-guide/ai-sensitive-data-scanner.md
      - Governance:
          - Policy Engine: user-guide/ai-policy.md
          - Policy Gateway: user-guide/ai-policy-gateway.md
      - Evaluation:
          - Evals: user-guide/ai-evals.md
          - Eval Assertions: user-guide/ai-eval-assertions.md
          - RAG Eval Runner: user-guide/ai-rag-eval-runner.md
      - Orchestration:
          - Workload Router: user-guide/ai-workload-router.md
          - Realtime Sessions: user-guide/ai-realtime.md
          - Agent Collaboration: user-guide/ai-agent-collaboration.md
          - MCP: user-guide/ai-mcp.md
          - Skills: user-guide/ai-skills.md
      - Model Runtime:
          - LLM Gateway: user-guide/ai-llm-gateway.md
          - Provider Adapters: user-guide/ai-provider-adapters.md
          - Fallback Chain: user-guide/ai-fallback-chain.md
          - Batch Complete: user-guide/ai-batch-complete.md
          - Structured Output: user-guide/ai-structured-output.md
          - LLM Cache: user-guide/ai-llm-cache.md
          - Replay Tape: user-guide/ai-replay-tape.md
  - User Guide:
      - Foundation:
          - Core: user-guide/core.md
          - IO: user-guide/io.md
          - CLI: user-guide/cli.md
      - Supporting Components:
          - Prompt Fingerprint: user-guide/ai-prompt-fingerprint.md
          - JSON Repair: user-guide/ai-json-repair.md
          - Cost Ledger: user-guide/ai-cost-ledger.md
  - Recipes:
      - CLI Tool: recipes/cli-tool.md
      - Production Evaluation Pipeline: recipes/rag-eval-runner.md
      - AI Telemetry: recipes/ai-telemetry.md
      - Runtime Governance Pattern: recipes/policy-gateway.md
      - Observable Runtime Routing: recipes/agent-collaboration-runtime.md
      - Policy + Collaboration E2E: recipes/policy-collaboration-e2e.md
  - Patterns — Before & After:
      - Basic LLM Call vs. Production Gateway: patterns/01-basic-llm-call.md
      - Simple RAG vs. Production Retrieval: patterns/02-rag-pipeline.md
      - Basic Agent vs. Governed Agent: patterns/03-agent-system.md
      - Single Provider vs. Resilient Chain: patterns/04-provider-resilience.md
      - No Observability vs. Full OTEL Stack: patterns/05-observability-gap.md
  - Reference:
      - API Reference: api.md
      - AI Product Engineering Overview: user-guide/ai-product-engineering.md
      - Component Maturity Model: user-guide/component-maturity.md
  - Roadmap: roadmap.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/inference-stack-llc/electripy-ai
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/electripy-ai/
    - icon: fontawesome/solid/globe
      link: https://electripy.ai
